<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>系统镜像下载</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial;background:#f5f5f5;padding:20px}
        .container{max-width:900px;margin:0 auto}
        .panel{background:#fff;border-radius:8px;margin-bottom:15px;overflow:hidden}
        .panel-header{background:#2d89ef;color:#fff;padding:12px 15px;font-size:16px;font-weight:bold}
        .panel-body{padding:15px}
        .download-list{list-style:none}
        .download-list li{margin:10px 0}
        .download-list a{color:#0066cc;text-decoration:none}
        .download-list a:hover{text-decoration:underline}
    </style>
</head>
<body>
<div class="container">
    <div class="panel">
        <div class="panel-header">Windows 官方镜像</div>
        <div class="panel-body">
            <ul class="download-list">
                <li>Windows 10：<a href="https://www.microsoft.com/zh-cn/software-download/windows10" target="_blank">https://www.microsoft.com/zh-cn/software-download/windows10</a></li>
                <li>Windows 11：<a href="https://www.microsoft.com/zh-cn/software-download/windows11" target="_blank">https://www.microsoft.com/zh-cn/software-download/windows11</a></li>
            </ul>
        </div>
    </div>

    <div class="panel">
        <div class="panel-header">启动盘制作工具</div>
        <div class="panel-body">
            <ul class="download-list">
                <li>Rufus 官网地址：<a href="https://rufus.ie/zh/" target="_blank">https://rufus.ie/zh/</a></li>
            </ul>
        </div>
    </div>

    <div class="panel">
        <div class="panel-header">其他系统下载</div>
        <div class="panel-body">
            <ul class="download-list">
                <li>MSDN 镜像索引：<a href="https://next.itellyou.cn" target="_blank">https://next.itellyou.cn</a></li>
                <li>Ubuntu 系统：<a href="https://ubuntu.com/download" target="_blank">https://ubuntu.com/download</a></li>
            </ul>
        </div>
    </div>
</div>
</body>
</html>
