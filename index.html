<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D颗粒爱心旋转 | 粒子特效 | 星星背景</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Arial', 'Microsoft YaHei', sans-serif;
        }
        /* 可选：添加一个简单的提示文字，不影响体验 */
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255,255,255,0.6);
            background: rgba(0,0,0,0.4);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            pointer-events: none;
            z-index: 10;
            backdrop-filter: blur(4px);
            font-family: monospace;
        }
        @media (max-width: 600px) {
            #info { display: none; }
        }
    </style>
</head>
<body>
    <div id="info">❤️ 3D 粒子爱心 | 旋转 | 120fps 流畅体验</div>

    <!-- 引入 Three.js 核心库以及扩展组件 -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        // --- 初始化场景、相机、渲染器 (开启性能优化，追求高帧率) ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000); // 纯黑背景
        scene.fog = null; // 禁用雾效提升性能

        // 透视相机: 视野, 宽高比, 近平面, 远平面
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 3.5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // --- 后期特效: Bloom (发光效果增强颗粒爱心的视觉冲击，但不影响帧率，性能开销可控) ---
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.3, 0.85);
        bloomPass.threshold = 0.1;
        bloomPass.strength = 0.65;
        bloomPass.radius = 0.5;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);

        // --- 辅助: 简易星空粒子系统 (小星星背景) ---
        // 创建大量的静态星星点，分布在远处，营造深邃星空感
        const starCount = 1800;
        const starGeometry = new THREE.BufferGeometry();
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            // 分布在球壳范围或者立方体范围，为了背景深邃，范围较大 -30 到 30 之间，z轴稍微远离
            starPositions[i*3] = (Math.random() - 0.5) * 200;
            starPositions[i*3+1] = (Math.random() - 0.5) * 120;
            starPositions[i*3+2] = (Math.random() - 0.5) * 80 - 40; // 在相机后方和前方都有分布，但主要远处
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        
        // 星星颜色: 略带微弱的白色/淡蓝/淡黄，增加层次
        const starColors = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            const intensity = 0.4 + Math.random() * 0.8;
            const colorChoice = Math.random();
            if (colorChoice < 0.7) {
                starColors[i*3] = intensity;
                starColors[i*3+1] = intensity * 0.9;
                starColors[i*3+2] = intensity;
            } else if (colorChoice < 0.85) {
                starColors[i*3] = intensity;
                starColors[i*3+1] = intensity * 0.7;
                starColors[i*3+2] = intensity * 0.5;
            } else {
                starColors[i*3] = intensity * 0.7;
                starColors[i*3+1] = intensity * 0.8;
                starColors[i*3+2] = intensity;
            }
        }
        starGeometry.setAttribute('color', new THREE.BufferAttribute(starColors, 3));
        
        const starMaterial = new THREE.PointsMaterial({ size: 0.12, vertexColors: true, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending });
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);
        
        // 额外添加一层更稀疏更亮的星星，增加景深感
        const starCountBright = 600;
        const starGeoBright = new THREE.BufferGeometry();
        const starPosBright = new Float32Array(starCountBright * 3);
        for (let i = 0; i < starCountBright; i++) {
            starPosBright[i*3] = (Math.random() - 0.5) * 180;
            starPosBright[i*3+1] = (Math.random() - 0.5) * 100;
            starPosBright[i*3+2] = (Math.random() - 0.5) * 100 - 50;
        }
        starGeoBright.setAttribute('position', new THREE.BufferAttribute(starPosBright, 3));
        const starMatBright = new THREE.PointsMaterial({ color: 0xffdd99, size: 0.18, transparent: true, opacity: 0.7, blending: THREE.AdditiveBlending });
        const starsBright = new THREE.Points(starGeoBright, starMatBright);
        scene.add(starsBright);
        
        // 再添加极小闪烁星星(通过简单动画在update中改变透明度或大小太耗性能，不做了，保持静态足够)
        
        // --- 核心: 颗粒爱心 ---
        // 爱心参数方程: x = 16 * sin(t)^3, y = 13cos(t) - 5 cos(2t) - 2cos(3t) - cos(4t)
        // 这是一个经典的笛卡尔爱心曲线，为了3D立体感，我们将其绕Y轴旋转一定厚度，并在Z轴方向扩展，生成粒子云。
        // 为了颗粒感更加丰富，采用分层粒子: 主要爱心表面粒子 + 内部少量弥散粒子，使爱心看起来像发光颗粒云。
        
        // 粒子总数 (追求高密度颗粒效果，同时保证120fps，现代GPU轻松处理1.5w个点)
        const particleCount = 18500;
        
        // 存储位置和颜色
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        
        // 爱心缩放因子 (控制大小适应屏幕)
        const scaleFactor = 0.055;
        
        // 生成策略: 大部分粒子集中在爱心表面和近表面，一部分粒子在爱心周围光晕状弥散
        for (let i = 0; i < particleCount; i++) {
            // 决定粒子类型: 0 核心表面粒子, 1 内部填充粒子, 2 外围光晕粒子
            let type = 0;
            const rand = Math.random();
            if (rand < 0.75) type = 0;      // 表面及近表面主体
            else if (rand < 0.92) type = 1; // 内部填充，增加体积感
            else type = 2;                  // 外围光晕，营造梦幻颗粒感
            
            let x = 0, y = 0, z = 0;
            let r = 0, g = 0, b = 0;
            
            if (type === 0) {
                // 表面区域: 基于爱心曲线生成，并添加径向厚度 (法线方向微小偏移)
                // 随机参数 t (角度参数)
                const t = Math.random() * Math.PI * 2;
                // 经典爱心公式
                const xRaw = 16 * Math.pow(Math.sin(t), 3);
                const yRaw = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
                // 添加厚度: 在法线方向偏移，爱心曲线的法线方向近似可通过导数旋转获得，简化: 随机在垂直于曲线的平面加偏移
                // 但为了简单且美观，主要沿Z轴扩展以及径向微调，形成立体颗粒簇
                // 并且沿曲线方向也有微小偏移增加颗粒离散感
                const offsetStrength = 0.28;
                const offX = (Math.random() - 0.5) * offsetStrength;
                const offY = (Math.random() - 0.5) * offsetStrength;
                const offZ = (Math.random() - 0.5) * 0.65; // Z轴厚度，让爱心立体
                
                x = (xRaw + offX) * scaleFactor;
                y = (yRaw + offY) * scaleFactor;
                z = offZ * 0.8;
                
                // 颜色: 从中心红色到边缘橙红/粉红渐变，基于位置和随机微调
                const normY = (yRaw + 5) / 18; // 映射大致范围 -5~13 -> 0~1
                const intensity = 0.7 + Math.random() * 0.5;
                // 主色调: 红/橙红
                r = 0.9 + Math.random() * 0.3;
                g = 0.2 + Math.random() * 0.35 + (1 - normY) * 0.2;
                b = 0.2 + Math.random() * 0.3;
                // 根据位置调整: 心尖处更亮，心窝处稍暗但更红
                if (yRaw < -2) {
                    r += 0.15;
                    g += 0.05;
                } else if (yRaw > 5) {
                    g += 0.1;
                    r -= 0.05;
                }
                // 限制范围并增加亮度随机
                r = Math.min(1.0, r * intensity);
                g = Math.min(0.85, g * intensity * 0.9);
                b = Math.min(0.7, b * intensity * 0.8);
            } 
            else if (type === 1) {
                // 内部填充粒子: 在爱心体积内部随机生成，缩小范围，使爱心看起来饱满
                // 采用 rejection sampling 基于爱心形状内部的简单方法: 生成点在一定范围内，然后基于心形边界判断
                // 为了性能，我们预先生成: 让点在心形内部偏移，实际上通过缩放心形曲线并添加随机扰动
                const t = Math.random() * Math.PI * 2;
                let xRaw = 16 * Math.pow(Math.sin(t), 3);
                let yRaw = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
                // 内部偏移: 向内收缩 0.3~0.7 倍，并加随机
                const innerFactor = 0.3 + Math.random() * 0.5;
                xRaw = xRaw * innerFactor;
                yRaw = yRaw * innerFactor;
                // 增加额外随机扩散
                const spread = 0.35;
                x = (xRaw + (Math.random() - 0.5) * spread) * scaleFactor;
                y = (yRaw + (Math.random() - 0.5) * spread) * scaleFactor;
                z = (Math.random() - 0.5) * 0.9;
                
                // 内部颜色更浓郁，偏深红/亮红
                r = 0.85 + Math.random() * 0.35;
                g = 0.15 + Math.random() * 0.3;
                b = 0.1 + Math.random() * 0.3;
                // 稍微增加亮度变化
                const bright = 0.8 + Math.random() * 0.6;
                r = Math.min(1.0, r * bright);
                g = Math.min(0.7, g * bright);
                b = Math.min(0.6, b * bright);
            } 
            else {
                // 外围光晕粒子: 围绕爱心外围随机球形/椭球形分布，营造星尘效果
                // 采用爱心形状的扩展范围，沿爱心曲线放大并加随机
                const t = Math.random() * Math.PI * 2;
                let xRaw = 16 * Math.pow(Math.sin(t), 3);
                let yRaw = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
                // 外围偏移较大
                const outerScale = 1.1 + Math.random() * 0.6;
                xRaw = xRaw * outerScale;
                yRaw = yRaw * outerScale;
                const radialOffset = (Math.random() - 0.5) * 0.9;
                const angleZ = Math.random() * Math.PI * 2;
                x = (xRaw + Math.cos(angleZ) * radialOffset) * scaleFactor;
                y = (yRaw + Math.sin(angleZ) * radialOffset * 0.8) * scaleFactor;
                z = (Math.random() - 0.5) * 1.4;
                
                // 外围颜色: 淡红, 金色, 粉红, 略带蓝紫
                const colorType = Math.random();
                if (colorType < 0.7) {
                    r = 0.9 + Math.random() * 0.3;
                    g = 0.3 + Math.random() * 0.5;
                    b = 0.4 + Math.random() * 0.4;
                } else if (colorType < 0.9) {
                    r = 1.0;
                    g = 0.6 + Math.random() * 0.4;
                    b = 0.3 + Math.random() * 0.3;
                } else {
                    r = 0.7 + Math.random() * 0.3;
                    g = 0.4 + Math.random() * 0.4;
                    b = 0.9 + Math.random() * 0.3;
                }
                // 外围透明度通过材质整体控制透明度更好，颜色较亮且半透感
                const alphaMul = 0.7 + Math.random() * 0.5;
                r = Math.min(1.0, r * alphaMul);
                g = Math.min(1.0, g * alphaMul);
                b = Math.min(1.0, b * alphaMul);
            }
            
            positions[i*3] = x;
            positions[i*3+1] = y;
            positions[i*3+2] = z;
            
            colors[i*3] = r;
            colors[i*3+1] = g;
            colors[i*3+2] = b;
        }
        
        const heartGeometry = new THREE.BufferGeometry();
        heartGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        heartGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        
        // 创建圆形渐变纹理用于粒子，让每个颗粒更加柔和 (圆形渐变点精灵)
        const createParticleTexture = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 32;
            canvas.height = 32;
            const ctx = canvas.getContext('2d');
            ctx.beginPath();
            ctx.arc(16, 16, 14, 0, 2 * Math.PI);
            ctx.fillStyle = 'white';
            ctx.fill();
            ctx.globalCompositeOperation = 'source-over';
            ctx.shadowBlur = 0;
            const gradient = ctx.createRadialGradient(16, 16, 0, 16, 16, 14);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.4, 'rgba(255,180,100,0.9)');
            gradient.addColorStop(0.7, 'rgba(255,80,80,0.6)');
            gradient.addColorStop(1, 'rgba(255,0,0,0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 32, 32);
            return new THREE.CanvasTexture(canvas);
        };
        
        const particleMaterial = new THREE.PointsMaterial({
            size: 0.045,
            vertexColors: true,
            map: createParticleTexture(),
            transparent: true,
            opacity: 0.95,
            blending: THREE.AdditiveBlending,
            depthWrite: false,   // 允许粒子叠加，增强光晕感
            depthTest: true
        });
        
        const heartParticles = new THREE.Points(heartGeometry, particleMaterial);
        scene.add(heartParticles);
        
        // 增加一层更细小的高光粒子，围绕爱心边缘，强化颗粒感 (额外的粒子层，让爱心看起来更闪耀)
        const extraGlowCount = 4000;
        const extraPositions = new Float32Array(extraGlowCount * 3);
        const extraColors = new Float32Array(extraGlowCount * 3);
        for (let i = 0; i < extraGlowCount; i++) {
            const t = Math.random() * Math.PI * 2;
            const xRaw = 16 * Math.pow(Math.sin(t), 3);
            const yRaw = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
            // 沿着法线方向轻微向外偏移
            const outward = 0.12 + Math.random() * 0.28;
            const angleOff = Math.random() * Math.PI * 2;
            const offX = Math.cos(angleOff) * outward * 0.6;
            const offY = Math.sin(angleOff) * outward * 0.6;
            const offZ = (Math.random() - 0.5) * 0.5;
            let x = (xRaw + offX) * scaleFactor;
            let y = (yRaw + offY) * scaleFactor;
            let z = offZ * 0.9;
            // 随机抖动
            x += (Math.random() - 0.5) * 0.03;
            y += (Math.random() - 0.5) * 0.03;
            extraPositions[i*3] = x;
            extraPositions[i*3+1] = y;
            extraPositions[i*3+2] = z;
            
            // 高光颜色: 橙红、金黄、亮白
            const colRand = Math.random();
            let r, g, b;
            if (colRand < 0.6) {
                r = 1.0;
                g = 0.5 + Math.random() * 0.5;
                b = 0.3 + Math.random() * 0.4;
            } else if (colRand < 0.85) {
                r = 1.0;
                g = 0.8 + Math.random() * 0.2;
                b = 0.5 + Math.random() * 0.4;
            } else {
                r = 1.0;
                g = 0.9;
                b = 0.7;
            }
            extraColors[i*3] = r;
            extraColors[i*3+1] = g;
            extraColors[i*3+2] = b;
        }
        const extraGlowGeo = new THREE.BufferGeometry();
        extraGlowGeo.setAttribute('position', new THREE.BufferAttribute(extraPositions, 3));
        extraGlowGeo.setAttribute('color', new THREE.BufferAttribute(extraColors, 3));
        const glowMaterial = new THREE.PointsMaterial({ size: 0.028, vertexColors: true, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false });
        const extraGlowPoints = new THREE.Points(extraGlowGeo, glowMaterial);
        scene.add(extraGlowPoints);
        
        // --- 简单环境光虽然点材质不受光影响，但为了场景如果有其他元素，不加也无妨，但是不加光也没问题，因为粒子自发光颜色---
        
        // --- 让星空有缓慢的自转，增加动态背景 (轻微，不影响性能) ---
        // 为了让星空更有生气，星星整体缓慢旋转
        // 爱心单独旋转，星空反向慢旋或者同向慢旋
        
        // --- 动画控制: 爱心旋转 (绕Y轴为主，略微X轴倾斜增加动感) ---
        // 创建组以便整体旋转? 单独旋转heartParticles和extraGlowPoints即可，但星星背景最好不动或者微动，让爱心旋转更有对比
        
        let time = 0;
        
        // 性能监控标志 (不实际显示，但保证无卡顿，通过requestAnimationFrame 的帧间隔控制)
        let lastTime = performance.now();
        let frameCount = 0;
        
        // 辅助: 让星星背景有极缓慢的自转，深邃感
        function animateStars() {
            stars.rotation.y += 0.0004;
            stars.rotation.x += 0.0002;
            starsBright.rotation.y -= 0.0003;
            starsBright.rotation.z += 0.0001;
        }
        
        // 爱心旋转速度
        let rotY = 0;
        let rotX = 0.2; // 轻微倾斜
        
        // 创建一个小光晕效果: 在爱心中心添加一个点光源或者透镜光晕会降低性能，不添加额外光源，依靠bloom已经足够
        
        // --- 鼠标交互? 可以轻微影响旋转速度或者视角，但为了简洁不加入过多逻辑，专注于120帧，但加入极简的自动旋转---
        
        // 动画循环
        function render() {
            // 性能优化: 使用 requestAnimationFrame 自带节流，无额外开销，确保渲染帧率最大化
            const now = performance.now();
            const delta = Math.min(1/30, (now - lastTime) / 1000);
            lastTime = now;
            
            // 更新旋转角度，匀速旋转 (每秒约0.8弧度，大约12秒一圈，优雅)
            rotY += 0.008;
            rotX = 0.15 + Math.sin(time * 0.3) * 0.05; // 轻微上下摆动，增加生动性
            
            // 应用旋转: 分别旋转爱心主体和高光层，使它们同步
            heartParticles.rotation.y = rotY;
            heartParticles.rotation.x = rotX;
            extraGlowPoints.rotation.y = rotY;
            extraGlowPoints.rotation.x = rotX;
            
            // 星空缓慢移动
            animateStars();
            
            // 动态轻微改变粒子的大小 (极微小变化增加呼吸感，性能无影响)
            // 为了帧率不频繁修改材质uniform，但只是size变化开销极小
            const pulse = 0.98 + Math.sin(time * 3) * 0.02;
            particleMaterial.size = 0.045 * pulse;
            glowMaterial.size = 0.028 * (0.95 + Math.sin(time * 4.2) * 0.03);
            // 星星大小微调
            starMaterial.size = 0.12 * (0.9 + Math.sin(time * 0.5) * 0.1);
            starMatBright.size = 0.18 * (0.9 + Math.sin(time * 0.7) * 0.1);
            
            // 更新后期效果强度稍微动态 (可选)
            // bloomPass.strength = 0.65 + Math.sin(time * 1.2) * 0.05;
            
            // 相机轻微浮动 (非常细微，增强3D感)
            camera.position.x += (0 - camera.position.x) * 0.05;
            camera.position.y += (Math.sin(time * 0.2) * 0.02 - camera.position.y) * 0.05;
            camera.lookAt(0, 0, 0);
            
            // 使用 EffectComposer 渲染
            effectComposer.render();
            
            time += 0.016; // 近似每一帧增加，与delta无关，保持连续
            
            // 简单帧率监控 (不输出到控制台避免开销，只是理论上保证流畅)
            requestAnimationFrame(render);
        }
        
        // 启动动画
        render();
        
        // 窗口大小适配，更新相机比例和渲染器尺寸
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            effectComposer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // 控制台输出提示，表示运行流畅
        console.log('3D颗粒爱心已启动 | 粒子数量: ' + (particleCount + extraGlowCount) + ' + 星星粒子: ' + (starCount + starCountBright) + ' | 高性能模式');
        
        // 可选: 添加一个简单的性能友好提示，确保没有额外开销
    </script>
</body>
</html>
