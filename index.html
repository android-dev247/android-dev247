<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网址无法打开</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        body {
            background-color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .illustration {
            margin-bottom: 30px;
            text-align: center;
        }
        .illustration svg {
            width: 280px;
            height: auto;
        }
        h1 {
            font-size: 36px;
            color: #000;
            font-weight: 500;
            margin-bottom: 12px;
        }
        .desc {
            font-size: 20px;
            color: #666;
            margin-bottom: 40px;
            text-align: center;
        }
        .buttons {
            display: flex;
            gap: 20px;
        }
        button {
            padding: 12px 32px;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-detail {
            border: 1px solid #ccc;
            background: #fff;
            color: #666;
        }
        .btn-retry {
            border: 1px solid #ccc;
            background: #fff;
            color: #666;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-retry:hover, .btn-detail:hover {
            background-color: #f5f5f5;
        }
        .retry-icon {
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="illustration">
        <!-- 简化插画：人物+问号气泡+纸箱 -->
        <svg viewBox="0 0 280 220" xmlns="http://www.w3.org/2000/svg">
            <!-- 人物 -->
            <path d="M120,160 L140,120 L160,160" fill="none" stroke="#e0e0e0" stroke-width="4"/>
            <path d="M130,120 L130,80 Q140,60 155,65 L175,75 L170,100 L150,90 L140,110" fill="#415EAC"/>
            <path d="M130,80 L110,90 L105,110 L120,105" fill="#415EAC"/>
            <path d="M135,75 C142,68 150,70 152,78 C150,86 142,88 135,81" fill="#fff"/>
            <circle cx="142" cy="72" r="2" fill="#333"/>
            <circle cx="148" cy="74" r="2" fill="#333"/>
            <path d="M143,80 Q146,83 150,82" fill="none" stroke="#333" stroke-width="1.5"/>
            <!-- 手机 -->
            <rect x="122" y="95" width="12" height="20" rx="2" fill="#333"/>
            <!-- 问号气泡 -->
            <circle cx="190" cy="80" r="30" fill="#fff" stroke="#ccc" stroke-width="1.5"/>
            <text x="190" y="88" font-size="28" fill="#9C27B0" text-anchor="middle">?</text>
            <!-- 纸箱 -->
            <rect x="150" y="130" width="60" height="40" fill="#fff" stroke="#ccc" stroke-width="1.5"/>
            <path d="M150,130 L180,115 L210,130" fill="#fff" stroke="#ccc" stroke-width="1.5"/>
            <rect x="185" y="140" width="5" height="25" fill="#9FA8DA"/>
        </svg>
    </div>
    <h1>网址暂时无法打开</h1>
    <p class="desc">请确认网址输入或切换网络后刷新</p>
    <div class="buttons">
        <button class="btn-detail">查看详情</button>
        <button class="btn-retry">
            <span class="retry-icon">⟳</span>
            重试
        </button>
    </div>
</body>
</html>
